}

// ============================================================
// EXPORT EXCEL
// ============================================================
function exportExcel() {
  if(!results.length) return;

  // Header row
  const headers = ['Image Path','Title','Brand','Type','Bullet Point 1','Bullet Point 2','Description','Keywords (Valid)','All Keywords','Status'];
  // Add Color1 - Color34
  for(let c=1;c<=34;c++) headers.push('Color'+c);

  const wsData = [headers];

  results.forEach(r => {
    const row = [
      r.imagePath,
      r.title,
      r.brand,
      r.type,
      r.bulletPoint1 || '',
      r.bulletPoint2 || '',
      r.description || '',
      r.validKeywords.join(', '),
      r.keywords.join(', '),
      r.status === 'done' ? 'Success' : 'Error'
    ];
    // Add colors to Color1-Color34 columns
    for(let c=0;c<34;c++) {
      row.push(r.colors[c] || '');
    }
    wsData.push(row);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  const colWidths = [
    {wch:25},{wch:60},{wch:20},{wch:25},{wch:40},{wch:40},{wch:60},{wch:50},{wch:50},{wch:10}
  ];
  for(let c=0;c<34;c++) colWidths.push({wch:16});
  ws['!cols'] = colWidths;

  XLSX.utils.book_append_sheet(wb, ws, 'Merch Keywords');

  // สร้างไฟล์ใหม่เสมอ (timestamp unique)
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10).replace(/-/g,'');
  const timeStr = now.toTimeString().slice(0,8).replace(/:/g,'');
  const filename = `Amazon_Merch_Keywords_${dateStr}_${timeStr}.xlsx`;
  XLSX.writeFile(wb, filename);
  showStatus(`📥 Export สำเร็จ: ${filename}`, 'success');
}

// ============================================================
// REJECTED DB UI
// ============================================================
function addRejected() {
  const kw = document.getElementById('rejectedInput').value.trim();
  const reason = document.getElementById('rejectedReason').value.trim() || 'Manual';
  if(!kw) return;
  const db = DB.getRejected();
  db.unshift({ id:'rk_'+Date.now(), keyword:kw, reason:reason, dateAdded:new Date().toISOString().slice(0,10), source:'manual' });
  DB.setRejected(db);
  document.getElementById('rejectedInput').value = '';
  document.getElementById('rejectedReason').value = '';
  renderRejectedDB();
  updateSettingsStats();
}

function deleteRejected(id) {
  const db = DB.getRejected().filter(r => r.id !== id);
  DB.setRejected(db);
  renderRejectedDB();
  updateSettingsStats();
}

function renderRejectedDB() {
  const search = (document.getElementById('rejectedSearch')?.value || '').toLowerCase();
  const db = DB.getRejected().filter(r => !search || r.keyword.toLowerCase().includes(search) || (r.reason||'').toLowerCase().includes(search));
  document.getElementById('rejectedCount').textContent = DB.getRejected().length + ' รายการ';
  document.getElementById('rejectedBody').innerHTML = db.length === 0
    ? '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">ยังไม่มี rejected keywords</td></tr>'
    : db.map((r,i) => `<tr>
        <td>${i+1}</td>
        <td>${r.keyword}</td>
        <td>${r.reason || '-'}</td>
        <td>${r.dateAdded}</td>
        <td><span class="badge badge-${r.source==='manual'?'blue':'orange'}">${r.source||'manual'}</span></td>
        <td><button class="btn btn-sm btn-red" onclick="deleteRejected('${r.id}')">✗</button></td>
      </tr>`).join('');
}

// ============================================================
// SEASONAL DB UI
// ============================================================
function populateSeasonSelect() {
  const sel = document.getElementById('seasonSelect');
  const db = DB.getSeasonal();
  sel.innerHTML = '<option value="">-- เลือกเทศกาล --</option>' + db.map(s => {
    const now = new Date().getMonth()+1;
    const active = s.activeMonths.includes(now);
    return `<option value="${s.id}">${active?'🟢':'⚪'} ${s.season}</option>`;
  }).join('');
}

function addSeasonalKW() {
  const sid = document.getElementById('seasonSelect').value;
  const kw = document.getElementById('seasonKWInput').value.trim();
  if(!sid || !kw) return;
  const db = DB.getSeasonal();
  const s = db.find(x => x.id === sid);
  if(s && !s.keywords.includes(kw)) {
    s.keywords.push(kw);
    DB.setSeasonal(db);
    document.getElementById('seasonKWInput').value = '';
    renderSeasonalDB();
  }
}

function deleteSeasonalKW(sid, kw) {
  const db = DB.getSeasonal();
  const s = db.find(x => x.id === sid);
  if(s) {
    s.keywords = s.keywords.filter(k => k !== kw);
    DB.setSeasonal(db);
    renderSeasonalDB();
  }
}

function addNewSeason() {
  const name = prompt('ชื่อเทศกาลใหม่:');
  if(!name) return;
  const months = prompt('เดือนที่ active (เช่น 1,2,3):');
  if(!months) return;
  const db = DB.getSeasonal();
  db.push({
    id: 's_'+Date.now(),
    season: name,
    keywords: [],
    activeMonths: months.split(',').map(m => parseInt(m.trim())).filter(m => m>=1 && m<=12)
  });
  DB.setSeasonal(db);
  populateSeasonSelect();
  renderSeasonalDB();
}

function deleteSeason(sid) {
  if(!confirm('ลบเทศกาลนี้?')) return;
  const db = DB.getSeasonal().filter(s => s.id !== sid);
  DB.setSeasonal(db);
  populateSeasonSelect();
  renderSeasonalDB();
}

function renderSeasonalDB() {
  const db = DB.getSeasonal();
  const now = new Date().getMonth()+1;
  const sid = document.getElementById('seasonSelect')?.value;
  const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';

  const toShow = sid ? db.filter(s=>s.id===sid) : db;
  toShow.forEach(s => {
    const active = s.activeMonths.includes(now);
    html += `<div class="panel" style="margin:0;border-color:${active?'var(--green)':'var(--border)'}">
      <div class="flex-between mb8">
        <div>
          <strong style="color:${active?'var(--green)':'var(--text)'}">${active?'🟢':'⚪'} ${s.season}</strong>
          <br><small style="color:var(--muted)">Months: ${s.activeMonths.map(m=>monthNames[m]).join(', ')}</small>
        </div>
        <button class="btn btn-sm btn-red" onclick="deleteSeason('${s.id}')">🗑️</button>
      </div>
      <div style="max-height:150px;overflow-y:auto">
        ${s.keywords.map(k => `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:12px">${k}</span>
          <button class="btn btn-sm btn-red" style="padding:2px 6px" onclick="deleteSeasonalKW('${s.id}','${k.replace(/'/g,"\\'")}'">✗</button>
        </div>`).join('')}
        ${s.keywords.length===0?'<div style="color:var(--muted);font-size:12px;padding:8px">ยังไม่มี keywords</div>':''}
      </div>
      <div style="margin-top:6px;font-size:11px;color:var(--muted)">${s.keywords.length} keywords</div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('seasonalContent').innerHTML = html;
  updateSettingsStats();
}

function addTrademark() {
  const term = document.getElementById('tmInput').value.trim();
  const cat = document.getElementById('tmCategory').value;
  if(!term) return;
  const db = DB.getTrademark();
  if(db.find(t => t.term.toLowerCase() === term.toLowerCase())) {
    showStatus('⚠️ "'+term+'" มีอยู่แล้ว','error');
    return;
  }
  db.unshift({ id:'tm_'+Date.now(), term, category:cat, dateAdded:new Date().toISOString().slice(0,10) });
  DB.setTrademark(db);
  document.getElementById('tmInput').value = '';
  renderTrademarkDB();
  updateSettingsStats();
}

function deleteTrademark(id) {
  const db = DB.getTrademark().filter(t => t.id !== id);
  DB.setTrademark(db);
  renderTrademarkDB();
  updateSettingsStats();
}

// ============================================================
// IMPORT / EXPORT DB
// ============================================================
function exportDB(type) {
  let data;
  if(type==='rejected') data = DB.getRejected();
  else if(type==='seasonal') data = DB.getSeasonal();
  else if(type==='trademark') data = DB.getTrademark();
  else if(type==='history') data = DB.getHistory();
  else return;

  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `merch_${type}_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importDB(type) {
  const input = document.getElementById('importFileInput');
  input.onchange = function(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error('Invalid format');
        if(type==='rejected') { DB.setRejected(data); renderRejectedDB(); }
        else if(type==='seasonal') { DB.setSeasonal(data); populateSeasonSelect(); renderSeasonalDB(); }
        else if(type==='trademark') { DB.setTrademark(data); renderTrademarkDB(); }
        else if(type==='history') { DB.setHistory(data); renderHistoryDB(); }
        showStatus('📥 Import สำเร็จ! ('+data.length+' รายการ)','success');
        updateSettingsStats();
      } catch(err) { showStatus('❌ Import ผิดพลาด: '+err.message,'error'); }
    };
    reader.readAsText(file);
    input.value = '';
  };
  input.click();
}

function exportAllDB() {
  const all = {
    rejected: DB.getRejected(),
    seasonal: DB.getSeasonal(),
    trademark: DB.getTrademark(),
    history: DB.getHistory(),
    settings: DB.getSettings()
  };
  const blob = new Blob([JSON.stringify(all,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `merch_all_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importAllDB() {
  const input = document.getElementById('importFileInput');
  input.onchange = function(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if(data.rejected) DB.setRejected(data.rejected);
        if(data.seasonal) DB.setSeasonal(data.seasonal);
        if(data.trademark) DB.setTrademark(data.trademark);
        if(data.history) DB.setHistory(data.history);
        if(data.settings) DB.setSettings(data.settings);
        renderRejectedDB();
        populateSeasonSelect();
        renderSeasonalDB();
        renderTrademarkDB();
        renderHistoryDB();
        loadToggles();
        updateSettingsStats();
        showStatus('📥 Import All สำเร็จ!','success');
      } catch(err) { showStatus('❌ Import ผิดพลาด: '+err.message,'error'); }
    };
    reader.readAsText(file);
    input.value = '';
  };
  input.click();
}

function resetAllDB() {
  if(!confirm('⚠️ ล้างข้อมูลทั้งหมด? (Rejected, Seasonal, Trademark, History)')) return;
  if(!confirm('แน่ใจ? ข้อมูลจะหายทั้งหมดแล้วไม่สามารถกู้คืนได้')) return;
  localStorage.removeItem('merch_rejected');
  localStorage.removeItem('merch_seasonal');
  localStorage.removeItem('merch_trademark');
  localStorage.removeItem('merch_history');
  renderRejectedDB();
  populateSeasonSelect();
  renderSeasonalDB();
  renderTrademarkDB();
  renderHistoryDB();
  updateSettingsStats();
  showStatus('🗑️ ล้างข้อมูลทั้งหมดสำเร็จ','success');
}

function updateSettingsStats() {
  document.getElementById('setRejCount').textContent = DB.getRejected().length;
  document.getElementById('setSeaCount').textContent = DB.getSeasonal().reduce((a,s)=>a+s.keywords.length,0);
  document.getElementById('setTMCount').textContent = DB.getTrademark().length;
  document.getElementById('setHistCount').textContent = DB.getHistory().length;
}

// ============================================================
// GITHUB SYNC
// ============================================================
async function syncToGitHub() {
  const token = document.getElementById('ghToken').value;
  const repo = document.getElementById('ghRepo').value;
  if(!token || !repo) { showStatus('❌ กรุณาใส่ GitHub Token และ Repository','error'); return; }

  const all = {
    rejected: DB.getRejected(),
    seasonal: DB.getSeasonal(),
    trademark: DB.getTrademark(),
    history: DB.getHistory(),
    settings: DB.getSettings(),
    lastSync: new Date().toISOString()
  };

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(all,null,2))));

  try {
    // Check if file exists
    let sha = null;
    try {
      const check = await fetch(`https://api.github.com/repos/${repo}/contents/merch_keywords_db.json`, {
        headers: { 'Authorization': 'token '+token }
      });
      if(check.ok) { const d = await check.json(); sha = d.sha; }
    } catch(e) {}

    const body = {
      message: 'Update Merch Keywords DB - '+new Date().toISOString(),
      content: content
    };
    if(sha) body.sha = sha;

    const res = await fetch(`https://api.github.com/repos/${repo}/contents/merch_keywords_db.json`, {
      method: 'PUT',
      headers: { 'Authorization': 'token '+token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(res.ok) showStatus('📤 Push to GitHub สำเร็จ!','success');
    else { const err = await res.json(); throw new Error(err.message); }
  } catch(err) {
    showStatus('❌ GitHub Error: '+err.message,'error');
  }
}

async function pullFromGitHub() {
  const token = document.getElementById('ghToken').value;
  const repo = document.getElementById('ghRepo').value;
  if(!token || !repo) { showStatus('❌ กรุณาใส่ GitHub Token และ Repository','error'); return; }

  try {
    const res = await fetch(`https://api.github.com/repos/${repo}/contents/merch_keywords_db.json`, {
      headers: { 'Authorization': 'token '+token }
    });
    if(!res.ok) throw new Error('File not found');
    const d = await res.json();
    const data = JSON.parse(decodeURIComponent(escape(atob(d.content))));

    if(data.rejected) DB.setRejected(data.rejected);
    if(data.seasonal) DB.setSeasonal(data.seasonal);
    if(data.trademark) DB.setTrademark(data.trademark);
    if(data.history) DB.setHistory(data.history);
    if(data.settings) DB.setSettings(data.settings);

    renderRejectedDB();
    populateSeasonSelect();
    renderSeasonalDB();
    renderTrademarkDB();
    renderHistoryDB();
    loadToggles();
    updateSettingsStats();
    showStatus('📥 Pull from GitHub สำเร็จ! (Last sync: '+(data.lastSync||'unknown')+')','success');
  } catch(err) {
    showStatus('❌ GitHub Error: '+err.message,'error');
  }
}

let supabaseClient = null;

function connectSupabase() {
  const url = document.getElementById('supabaseUrl').value.trim();
  const key = document.getElementById('supabaseKey').value.trim();
  if(!url || !key) { showSupabaseStatus('❌ กรุณาใส่ URL และ Key','error'); return; }
  try {
    supabaseClient = window.supabase.createClient(url, key);
    // Save credentials
    const s = DB.getSettings(); s.supabaseUrl = url; s.supabaseKey = key; DB.setSettings(s);
    showSupabaseStatus('✅ เชื่อมต่อ Supabase สำเร็จ!','success');
    initSupabaseTables();
  } catch(e) { showSupabaseStatus('❌ เชื่อมต่อไม่สำเร็จ: '+e.message,'error'); }
}

async function initSupabaseTables() {
  if(!supabaseClient) return;
  // Try to create tables via RPC or just test connection
  try {
    const { data, error } = await supabaseClient.from('merch_data').select('id').limit(1);
    if(error && error.code === '42P01') {
      // Table doesn't exist - need to create via SQL editor in Supabase dashboard
      showSupabaseStatus('⚠️ ตารางmerch_data ยังไม่มี กรุณาสร้างใน Supabase Dashboard:<br><code style="font-size:10px;display:block;margin-top:4px;padding:6px;background:var(--card2);border-radius:4px;white-space:pre-wrap">CREATE TABLE merch_data (\n  id TEXT PRIMARY KEY DEFAULT \'main\',\n  rejected JSONB DEFAULT \'[]\'::jsonb,\n  seasonal JSONB DEFAULT \'[]\'::jsonb,\n  trademark JSONB DEFAULT \'[]\'::jsonb,\n  history JSONB DEFAULT \'[]\'::jsonb,\n  settings JSONB DEFAULT \'{}\'::jsonb,\n  updated_at TIMESTAMPTZ DEFAULT NOW()\n);\nALTER TABLE merch_data ENABLE ROW LEVEL SECURITY;\nCREATE POLICY "Allow anon access" ON merch_data FOR ALL USING (true);</code>','info');
    } else if(!error) {
      showSupabaseStatus('✅ เชื่อมต่อสำเร็จ! ตารางmerch_data พร้อมใช้งาน','success');
    } else {
      showSupabaseStatus('⚠️ '+error.message,'error');
    }
  } catch(e) { showSupabaseStatus('❌ '+e.message,'error'); }
}

async function pushToSupabase() {
  if(!supabaseClient) { showSupabaseStatus('❌ กรุณาเชื่อมต่อ Supabase ก่อน','error'); return; }
  showSupabaseStatus('<span class="spinner"></span> กำลัง Push...','info');
  try {
    const payload = {
      id: 'main',
      rejected: DB.getRejected(),
      seasonal: DB.getSeasonal(),
      trademark: DB.getTrademark(),
      history: DB.getHistory(),
      settings: DB.getSettings(),
      updated_at: new Date().toISOString()
    };
    const { error } = await supabaseClient.from('merch_data').upsert(payload);
    if(error) throw error;
    showSupabaseStatus('✅ Push ไป Supabase สำเร็จ! ('+new Date().toLocaleString('th-TH')+')','success');
  } catch(e) { showSupabaseStatus('❌ Push Error: '+e.message,'error'); }
}

async function pullFromSupabase() {
  if(!supabaseClient) { showSupabaseStatus('❌ กรุณาเชื่อมต่อ Supabase ก่อน','error'); return; }
  showSupabaseStatus('<span class="spinner"></span> กำลัง Pull...','info');
  try {
    const { data, error } = await supabaseClient.from('merch_data').select('*').eq('id','main').single();
    if(error) throw error;
    if(!data) { showSupabaseStatus('⚠️ ยังไม่มีข้อมูลบน Cloud','info'); return; }
    if(data.rejected) DB.setRejected(data.rejected);
    if(data.seasonal) DB.setSeasonal(data.seasonal);
    if(data.trademark) DB.setTrademark(data.trademark);
    if(data.history) DB.setHistory(data.history);
    if(data.settings) {
      const s = data.settings;
      s.supabaseUrl = document.getElementById('supabaseUrl').value;
      s.supabaseKey = document.getElementById('supabaseKey').value;
      DB.setSettings(s);
    }
    renderRejectedDB(); populateSeasonSelect(); renderSeasonalDB();
    renderTrademarkDB(); renderHistoryDB(); loadToggles(); updateSettingsStats();
    showSupabaseStatus('✅ Pull จาก Supabase สำเร็จ! (อัพเดท: '+(data.updated_at?new Date(data.updated_at).toLocaleString('th-TH'):'N/A')+')','success');
  } catch(e) { showSupabaseStatus('❌ Pull Error: '+e.message,'error'); }
}

function showSupabaseStatus(msg, type) {
  const el = document.getElementById('supabaseStatus');
  if(el) el.innerHTML = `<div class="status-box status-${type}">${msg}</div>`;
}

// ============================================================
// INITIALIZE
// ============================================================
function loadSupabaseSettings() {
  const s = DB.getSettings();
  if(s.supabaseUrl) document.getElementById('supabaseUrl').value = s.supabaseUrl;
  if(s.supabaseKey) document.getElementById('supabaseKey').value = s.supabaseKey;
  if(s.supabaseUrl && s.supabaseKey) {
    try {
      supabaseClient = window.supabase.createClient(s.supabaseUrl, s.supabaseKey);
    } catch(e) {}
  }
}

init();
loadSupabaseSettings();
</script>
